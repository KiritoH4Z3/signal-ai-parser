name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run offline pure-function tests
        # The test path imports only utils.constants — no streamlit / genai /
        # network / API key required, so no extra deps are installed here.
        run: pytest tests/ -q
